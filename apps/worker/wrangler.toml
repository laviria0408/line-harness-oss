name = "trycle-poc"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# nodejs_compat is required by @line-harness/update-engine which pulls in
# `node:stream` (Readable.fromWeb), `node:zlib` (createGunzip), `node:crypto`
# (createHash), and the `tar-stream` package for bundle parsing during the
# /admin/update/* self-update flow. Without this flag the route imports
# fail at runtime. compatibility_date 2024-09-23+ is required for the flag.
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = TRYCLE PoC (laviria0408@)
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "375ccebf7904d6088d4ba97c643533d5"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "trycle-poc"
database_id = "d194f511-743c-4627-bd55-5cd5de38798e"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "trycle-poc-images"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# ═══════════════════════════════════════════════════════════════
# Phase 5 self-update vars — consumed by /admin/update/*. Secrets
# (CF_API_TOKEN, ADMIN_API_KEY) must be set via `wrangler secret put`
# and are intentionally absent from this file.
# ═══════════════════════════════════════════════════════════════
[vars]
WORKER_NAME = "trycle-poc"
ADMIN_PAGES_PROJECT = "trycle-poc-admin-155f311f"
LIFF_PAGES_PROJECT = "trycle-poc-liff"
D1_DATABASE_ID = "d194f511-743c-4627-bd55-5cd5de38798e"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://trycle-poc.trycle-g1st-dev.workers.dev"
ADMIN_PUBLIC_URL = "https://trycle-poc-admin-155f311f.pages.dev"
LIFF_PUBLIC_URL = "https://trycle-poc-liff.pages.dev"
CF_ACCOUNT_ID = "375ccebf7904d6088d4ba97c643533d5"
# Pkg1 整備見積 (Step 4-7): 同意書 LIFF の公開 URL (非機密ゆえ var)。
LIFF_CONSENT_URL = "https://liff.line.me/2010454164-PQzCGMhy"
# GMAIL_NOTIFICATION_TO (店舗スタッフ通知先) と GAS_WEB_APP_URL は secret:
#   wrangler secret put GMAIL_NOTIFICATION_TO
#   wrangler secret put GAS_WEB_APP_URL
# Consent LIFF (Pkg1 案 B) endpoints (/api/consent-document, /api/consent-callback)
# need no new vars: they reuse SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY /
# TRYCLE_TENANT_ID (secrets) and verify the LIFF access_token against LINE's
# public Profile API (https://api.line.me/v2/profile).

# ═══════════════════════════════════════════════════════════════
# 本番環境
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "YOUR_ACCOUNT_ID"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# Phase 5 self-update vars for production. Worker / Pages / D1 names point at
# the prod resources. Secrets (CF_API_TOKEN, ADMIN_API_KEY) live in the
# production secret store, set via `wrangler secret put --env production`.
[env.production.vars]
WORKER_NAME = "your-worker-name"
ADMIN_PAGES_PROJECT = "line-harness-admin"
LIFF_PAGES_PROJECT = "line-harness-liff"
D1_DATABASE_ID = "YOUR_D1_DATABASE_ID"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://your-worker-name.workers.dev"
ADMIN_PUBLIC_URL = "https://line-harness-admin.pages.dev"
LIFF_PUBLIC_URL = "https://line-harness-liff.pages.dev"
CF_ACCOUNT_ID = "YOUR_ACCOUNT_ID"
